spring:
  main:
    banner-mode: off
  application:
    name: MokuLib
  jackson:
    property-naming-strategy: SNAKE_CASE
  profiles:
    active: test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
    username: sa
    password:


mokulib:
  image-path:
    avatars:
      path-mode: absolute
      save-path: F:/moku/avatars/
      visit-path: avatars
    books:
      path-mode: absolute
      save-path: F:/moku/books/
      visit-path: books